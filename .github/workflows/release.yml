name: Release

# Publish to PyPI when a version tag is pushed (e.g. v0.5.1).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored anywhere.
# The publish job only runs after the tag is confirmed to match the
# pyproject version AND the test suite passes, so a red build or a
# mistyped tag can never reach PyPI (a published version is permanent).
on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Guard tag + run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=${TAG} pyproject=${VER}"
          if [ "${TAG}" != "${VER}" ]; then
            echo "::error::tag v${TAG} does not match pyproject version ${VER} — bump pyproject or retag"
            exit 1
          fi

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  pypi-publish:
    name: Build + publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi          # configure this name in the PyPI trusted publisher
    permissions:
      contents: read           # required for actions/checkout (private repo)
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
